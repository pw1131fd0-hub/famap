name: FamMap CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-client:
    name: Test Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install dependencies
        run: cd client && npm ci --legacy-peer-deps

      - name: Run tests
        run: cd client && npm test -- --run --reporter=verbose

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./client/coverage/coverage-final.json
          flags: client
          name: client-coverage

  test-server:
    name: Test Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'server/requirements.txt'

      - name: Install dependencies
        run: cd server && pip install -r requirements.txt

      - name: Run tests
        run: cd server && python -m pytest -v --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./server/coverage.xml
          flags: server
          name: server-coverage

  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    needs: test-client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install dependencies
        run: cd client && npm ci --legacy-peer-deps

      - name: Build
        run: cd client && npm run build

      - name: Check build
        run: |
          if [ ! -d "client/dist" ]; then
            echo "Build failed - dist directory not created"
            exit 1
          fi
          echo "Build successful"
          du -sh client/dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/dist
          retention-days: 5

  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: test-server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'server/requirements.txt'

      - name: Install dependencies
        run: cd server && pip install -r requirements.txt

      - name: Check imports
        run: cd server && python -m py_compile app/*.py

      - name: Build Docker image
        run: |
          cd server
          docker build -t famap-api:latest . || echo "Docker not available (OK for CI)"

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check npm vulnerabilities (client)
        run: cd client && npm audit --audit-level=moderate || true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: cd server && pip install safety

      - name: Check Python vulnerabilities (server)
        run: cd server && safety check --json || true

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [build-client, build-server]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Check TypeScript
        run: cd client && npm ci --legacy-peer-deps && npm run build 2>&1 | tee build.log && grep -q "error TS" build.log && exit 1 || exit 0

      - name: Verify build artifacts
        run: |
          test -f client/dist/index.html || (echo "Missing index.html" && exit 1)
          test -f client/dist/assets/index-*.js || (echo "Missing JS assets" && exit 1)
          echo "✓ Build artifacts verified"

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [test-client, test-server, build-client, build-server, security-audit, quality-gate]
    if: always()
    steps:
      - name: Check workflow status
        run: |
          if [ "${{ needs.test-client.result }}" == "failure" ] || [ "${{ needs.test-server.result }}" == "failure" ]; then
            echo "❌ Tests failed"
            exit 1
          fi
          if [ "${{ needs.build-client.result }}" == "failure" ] || [ "${{ needs.build-server.result }}" == "failure" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          echo "✓ All checks passed"

      - name: Summary
        run: |
          echo "# FamMap CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Client Tests: ${{ needs.test-client.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Server Tests: ${{ needs.test-server.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Client Build: ${{ needs.build-client.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Server Build: ${{ needs.build-server.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Security: ${{ needs.security-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Quality Gate: ${{ needs.quality-gate.result }}" >> $GITHUB_STEP_SUMMARY
